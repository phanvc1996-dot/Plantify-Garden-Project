              <li>

                  class="text-white text-[20px] block mx-4 hover:text-green-400 transition-all ease-linear hover:scale-125"

          <label

            <img

              class="w-3/4 mx-auto lg:w-1/4 lg:aspect-[11/16] object-cover transition-all ease-linear hover:scale-105"

            <img
              src="./image/flower-3.jpg"
              alt=""
              class="w-3/4 mx-auto lg:w-1/4 lg:aspect-[11/16] object-cover transition-all ease-linear hover:scale-105"

              alt=""
              class="w-3/4 mx-auto lg:w-1/4 lg:aspect-[11/16] object-cover transition-all ease-linear hover:scale-105"
            />
          </section>
        </section>
      </section>
      <!-- Plant stands -->
      <section class="mt-[100px] py-20 px-10 bg-[#F3FFFC]">
        <section class="max-w-[1170px] mx-auto px-3">
          <h1 class="text-[#004F44] text-3xl text-center">Plant stands</h1>
          <section
            class="flex flex-col lg:flex-row lg:justify-center lg:items-center gap-8 lg:gap-3 mt-10"
